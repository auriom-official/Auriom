<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Auriom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f1e;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 60% 80%, rgba(16,185,129,0.1) 0%, transparent 60%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%   { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Floating grid dots */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 16px;
            animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .brand-text h1 {
            font-size: 18px;
            font-weight: 800;
            color: #f1f5f9;
            letter-spacing: 1px;
        }

        .brand-text span {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-heading {
            margin-bottom: 6px;
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .login-sub {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .input-wrapper input::placeholder {
            color: #475569;
        }

        /* Toggle password visibility */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: color 0.2s;
            padding: 2px 6px;
        }

        .toggle-pw:hover { color: #3b82f6; }

        .input-wrapper input[type="password"],
        .input-wrapper input.has-toggle {
            padding-right: 72px;
        }

        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            font-size: 12.5px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: none;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(59,130,246,0.3);
            margin-top: 6px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(59,130,246,0.4);
        }

        .btn-login:active:not(:disabled) { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Credentials hint box */
        .creds-hint {
            margin-top: 24px;
            padding: 14px;
            background: rgba(16,185,129,0.07);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
        }

        .creds-hint h4 {
            font-size: 11px;
            font-weight: 700;
            color: #10b981;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .cred-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .cred-row:last-child { margin-bottom: 0; }

        .cred-label {
            font-size: 11px;
            color: #64748b;
            width: 70px;
            flex-shrink: 0;
        }

        .cred-value {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cred-value:hover { background: rgba(59,130,246,0.15); color: #60a5fa; }

        .admin-badge {
            font-size: 10px;
            font-weight: 700;
            background: rgba(16,185,129,0.2);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 20px 0;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #334155;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="brand">
            <div class="brand-logo">AU</div>
            <div class="brand-text">
                <h1>AURIOM</h1>
                <span>Admin Portal</span>
            </div>
        </div>

        <h2 class="login-heading">Welcome back 👋</h2>
        <p class="login-sub">Sign in to access the admin dashboard. Only authorized users can proceed.</p>

        <div id="loginError" class="error-msg"></div>

        <form id="adminLoginForm" autocomplete="off">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="adminEmail" placeholder="admin@auriom.in" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="adminPassword" class="has-toggle" placeholder="Enter your password" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="togglePw">Show</button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Sign in to Dashboard</button>
        </form>



    </div>
    <p class="footer-note">© 2026 Auriom. Unauthorized access is prohibited.</p>
</div>

<script>
    const SUPABASE_URL = 'https://oqrxwwcxpduxqvyeatni.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcnh3d2N4cGR1eHF2eWVhdG5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjYzMjUsImV4cCI6MjA5NTcwMjMyNX0.-cDF_UN2LmlilXAoNxaEBQam4A-q45reEtIrGlcnoAo';

    // If already logged in → go straight to dashboard
    if (localStorage.getItem('auriom_admin_logged_in') === 'true') {
        window.location.replace('index.html');
    }

    let db = null;

    document.addEventListener('DOMContentLoaded', () => {
        // Init Supabase
        if (window.supabase && typeof window.supabase.createClient === 'function') {
            db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
            showError('Supabase SDK failed to load. Please check your internet connection and reload.');
        }

        // Password toggle
        const pwInput = document.getElementById('adminPassword');
        const toggleBtn = document.getElementById('togglePw');
        toggleBtn.addEventListener('click', () => {
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            toggleBtn.textContent = isHidden ? 'Hide' : 'Show';
        });

        // Login form submit
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            hideError();
            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';

            if (!db) {
                showError('Supabase is not initialized. Please reload the page.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in to Dashboard';
                return;
            }

            try {
                const { data, error } = await db
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .eq('password', password)
                    .eq('is_admin', true)
                    .maybeSingle();

                if (error) throw new Error('Database error: ' + error.message);
                if (!data)  throw new Error('Invalid credentials or no admin access.');
                if (data.status && data.status !== 'Active') throw new Error('Your account has been suspended.');

                // ✅ Success — save session and redirect
                localStorage.setItem('auriom_admin_logged_in', 'true');
                localStorage.setItem('auriom_admin_user', JSON.stringify(data));

                loginBtn.textContent = '✓ Redirecting...';
                window.location.replace('index.html');

            } catch (err) {
                showError(err.message);
            } finally {
                if (loginBtn.textContent !== '✓ Redirecting...') {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign in to Dashboard';
                }
            }
        });
    });

    function showError(msg) {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError() {
        const el = document.getElementById('loginError');
        el.style.display = 'none';
    }

    // Click-to-fill helpers
    function fillEmail(el) {
        document.getElementById('adminEmail').value = el.textContent;
    }

    function fillPassword(el) {
        document.getElementById('adminPassword').value = el.textContent;
        document.getElementById('adminPassword').type = 'text';
        document.getElementById('togglePw').textContent = 'Hide';
    }
</script>

</body>
</html>
